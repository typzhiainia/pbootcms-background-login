<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- PbootCMS 后台依赖 -->
    <script type="text/javascript" src="{APP_THEME_DIR}/js/jquery-1.12.4.min.js"></script>
</head>
<body>

<!-- 几何动态背景 -->
<div class="bg-scene">
    <canvas id="bgCanvas"></canvas>
    <div class="bg-overlay"></div>
</div>

<!-- 登录主体 -->
<main class="login-wrapper">
    <div class="login-card">
        <!-- 头部 -->
        <div class="card-header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
                </svg>
            </div>
            <h1>运营管理中心</h1>
            <p class="card-subtitle">登录您的账户以继续</p>
        </div>

        <!-- 问候语 -->
        <div class="greeting-bar" id="greeting"></div>

        <!-- 表单 -->
        <form action="{url./admin/Index/login}" onsubmit="return false" class="layui-form" id="dologin">
            <input type="hidden" name="formcheck" id="formcheck" value="{$formcheck}">

            <div class="field">
                <label class="field-label">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    账户
                </label>
                <input name="username" id="username" type="text" lay-verify="required"
                       placeholder="用户名 / 邮箱 / 手机号" autocomplete="off" class="layui-input">
                <span class="field-line"></span>
            </div>

            <div class="field">
                <label class="field-label">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    密码
                </label>
                <input name="password" id="password" type="password" lay-verify="required"
                       placeholder="请输入密码" autocomplete="off" class="layui-input">
                <span class="field-line"></span>
            </div>

            {if([$config.admin_check_code])}
            <div class="field">
                <label class="field-label">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    </svg>
                    安全验证
                </label>
                <div class="captcha-row">
                    <input name="text" id="checkcode" type="text" lay-verify="required"
                           placeholder="验证码" autocomplete="off" class="layui-input captcha-field">
                    <img title="点击刷新" src="{CORE_DIR}/code.php" class="captcha-img" id="codeimg"
                         onclick="this.src='{CORE_DIR}/code.php?'+Math.round(Math.random()*10);" />
                </div>
                <span class="field-line"></span>
            </div>
            {/if}

            <button type="button" class="btn-submit" id="login" lay-submit lay-filter="login-submit">
                <span>登 录</span>
            </button>
        </form>

        <!-- 底部 -->
        <div class="card-footer">
            <span>Powered by</span>
            <a href="https://gitee.com/czidc/pbootcms-background-login">Gitee</a>
            <span>&</span>
            <a href="https://github.com/T-Y-P/pbootcms-background-login">GitHub</a>
            <span class="copy">© 小筑</span>
        </div>
    </div>
</main>

<!-- PbootCMS 后台核心 JS（勿删） -->
<script type="text/javascript" src="{APP_THEME_DIR}/layui/layui.all.js?v=v2.5.4"></script>
<script type="text/javascript" src="{APP_THEME_DIR}/js/mylayui.js?v=v1.1.6"></script>
<!-- 主题脚本 -->
<script src="js/script.js"></script>
</body>
</html>

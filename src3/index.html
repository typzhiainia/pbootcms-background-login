<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- PbootCMS 后台依赖 -->
    <script type="text/javascript" src="{APP_THEME_DIR}/js/jquery-1.12.4.min.js"></script>
</head>
<body>

<!-- 动态背景 -->
<div class="bg-animated">
    <div class="bg-shape bg-shape-1"></div>
    <div class="bg-shape bg-shape-2"></div>
    <div class="bg-shape bg-shape-3"></div>
    <div class="bg-dots"></div>
</div>

<!-- 预加载动画 -->
<div id="preloader">
    <div class="loader-ring"></div>
</div>

<!-- 登录主体 -->
<main class="login-wrapper">
    <div class="login-container">
        <!-- 左侧品牌区 -->
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                        <path d="M2 17l10 5 10-5"/>
                        <path d="M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <h1 class="brand-title">运营管理中心</h1>
                <p class="brand-desc">安全 · 高效 · 智能</p>
                <div class="brand-greeting" id="greeting"></div>
            </div>
            <div class="brand-footer">
                Copyright © 2022 小筑
            </div>
        </div>

        <!-- 右侧登录表单 -->
        <div class="login-form-panel">
            <div class="form-header">
                <h2>账号登录</h2>
                <p>请输入您的账户信息</p>
            </div>

            <form action="{url./admin/Index/login}" onsubmit="return false" class="layui-form" id="dologin">
                <input type="hidden" name="formcheck" id="formcheck" value="{$formcheck}">

                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <input name="username" id="username" type="text" lay-verify="required"
                           placeholder="用户名 / 邮箱 / 手机号" autocomplete="off" class="layui-input">
                </div>

                <div class="input-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </div>
                    <input name="password" id="password" type="password" lay-verify="required"
                           placeholder="密码" autocomplete="off" class="layui-input">
                </div>

                {if([$config.admin_check_code])}
                <div class="input-group captcha-group">
                    <div class="input-icon">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                            <path d="M9 9h6v6H9z" stroke-dasharray="2 1"/>
                        </svg>
                    </div>
                    <input name="text" id="checkcode" type="text" lay-verify="required"
                           placeholder="验证码" autocomplete="off" class="layui-input captcha-input">
                    <img title="点击刷新" src="{CORE_DIR}/code.php" class="captcha-img" id="codeimg"
                         onclick="this.src='{CORE_DIR}/code.php?'+Math.round(Math.random()*10);" />
                </div>
                {/if}

                <button type="button" class="btn-login" id="login" lay-submit lay-filter="login-submit">
                    <span>登 录</span>
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                </button>
            </form>

            <div class="form-footer">
                Powered by <a href="https://gitee.com/czidc/pbootcms-background-login">Gitee</a>
                &nbsp;·&nbsp;
                <a href="https://github.com/T-Y-P/pbootcms-background-login">GitHub</a>
            </div>
        </div>
    </div>
</main>

<!-- PbootCMS 后台核心 JS（勿删） -->
<script type="text/javascript" src="{APP_THEME_DIR}/layui/layui.all.js?v=v2.5.4"></script>
<script type="text/javascript" src="{APP_THEME_DIR}/js/mylayui.js?v=v1.1.6"></script>
<!-- 主题脚本 -->
<script src="js/script.js"></script>
</body>
</html>
